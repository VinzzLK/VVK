name: Rebuild APK (apktool)

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Ambil repo
      - uses: actions/checkout@v4

      # Install Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Download apktool (auto latest dari GitHub)
      - name: Install apktool
        run: |
          LATEST=$(curl -s https://api.github.com/repos/iBotPeaches/Apktool/releases/latest \
            | grep tag_name | cut -d '"' -f4 | tr -d 'v')
          echo "Apktool version: $LATEST"
          wget "https://github.com/iBotPeaches/Apktool/releases/download/v${LATEST}/apktool_${LATEST}.jar" \
            -O apktool.jar
          echo "✅ apktool downloaded"

      # Build APK + log
      - name: Recompile APK
        run: |
          java -jar apktool.jar b . -o output-unsigned.apk 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}

          echo "=============================="
          echo "🔥 BUILD ERROR SUMMARY"
          echo "=============================="

          grep -i "error" build.log | head -20 || echo "No critical errors"

          echo "=============================="

          exit $BUILD_EXIT

      # Sign APK (debug key)
      - name: Sign APK
        if: success()
        run: |
          keytool -genkey -v -keystore debug.keystore \
            -storepass android -alias androiddebugkey \
            -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android,O=Android,C=US"

          jarsigner -keystore debug.keystore \
            -storepass android \
            -keypass android \
            output-unsigned.apk androiddebugkey

          mv output-unsigned.apk output.apk

      # Align APK
      - name: Zipalign
        if: success()
        run: |
          zipalign -v 4 output.apk final.apk

      # Upload build log (selalu diupload)
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      # Upload APK hasil build
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Recompiled-APK
          path: final.apk