name: Rebuild APK (apktool)

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install apktool
        run: |
          LATEST=$(curl -s https://api.github.com/repos/iBotPeaches/Apktool/releases/latest \
            | grep tag_name | cut -d '"' -f4 | tr -d 'v')
          echo "Apktool version: $LATEST"
          wget "https://github.com/iBotPeaches/Apktool/releases/download/v${LATEST}/apktool_${LATEST}.jar" \
            -O apktool.jar
          echo "✅ apktool downloaded"

      # Install Android Build Tools (zipalign + apksigner)
      - name: Install Android Build Tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y zipalign apksigner
          echo "✅ zipalign & apksigner ready"

      - name: Recompile APK
        run: |
          java -jar apktool.jar b . -o output-unsigned.apk 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}

          echo "=============================="
          echo "🔥 BUILD ERROR SUMMARY"
          echo "=============================="
          grep -i "error" build.log | head -20 || echo "No critical errors"
          echo "=============================="

          exit $BUILD_EXIT

      # Generate debug keystore
      - name: Generate Keystore
        if: success()
        run: |
          keytool -genkey -v -keystore debug.keystore \
            -storepass android -alias androiddebugkey \
            -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android,O=Android,C=US"

      # Zipalign SEBELUM sign (wajib urutannya)
      - name: Zipalign
        if: success()
        run: |
          zipalign -v 4 output-unsigned.apk output-aligned.apk

      # Sign pakai apksigner (v1 + v2 + v3 scheme)
      - name: Sign APK (apksigner)
        if: success()
        run: |
          apksigner sign \
            --ks debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out final.apk \
            output-aligned.apk
          
          echo "✅ APK signed"
          apksigner verify --verbose final.apk

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Recompiled-APK
          path: final.apk