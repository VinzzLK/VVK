<driconf>
    <!-- PurpleVK VinzzOpt - Adreno 650 (A6xx) Performance Config -->
    <!-- Applied globally for Zalith/FCL Launcher -->
    <device driver="turnip">
        <application name=".*" executable=".*">
            <!-- LRZ (Low Resolution Z) optimizations - major depth perf boost -->
            <option name="enable_lrz_fast_clear" value="true"/>
            <option name="disable_conservative_lrz" value="false"/>
            <!-- UBWC flag hint for texture processor - reduces bandwidth -->
            <option name="enable_tp_ubwc_flag_hint" value="true"/>
        </application>
        <!-- Minecraft Java (Zalith) -->
        <application name="Zalith Launcher" executable=".*">
            <option name="enable_lrz_fast_clear" value="true"/>
            <option name="enable_tp_ubwc_flag_hint" value="true"/>
        </application>
    </device>
    <device driver="freedreno">
        <application name=".*" executable=".*">
            <option name="enable_lrz_fast_clear" value="true"/>
            <option name="enable_tp_ubwc_flag_hint" value="true"/>
        </application>
    </device>
</driconf>
